name: Run Build

on:
  workflow_dispatch:
    inputs:
      app_name:
        type: string
        default: 'My-Prism-App'
        required: false
        description: "Type the name of your build."

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      # CLI call to simulated build process
      - name: Run Build
        run: |
          bash build.sh --platform Android --project-name ${{ github.event.inputs.app_name }}

      - name: Debug — List Files  
        run: |
          ls -la
          ls -la build/ || echo "build/ folder not found!"

      # CLI call to simulated upload process
      - name: Upload
        env:
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
        run: |
          bash upload.sh android build/Android/${{ github.event.inputs.app_name }}.apk