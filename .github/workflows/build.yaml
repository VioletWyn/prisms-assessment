name: Run Build

on:
  
  workflow_dispatch:
    inputs:
      app_name:
        type: string
        default: 'My-Prism-App'
        required: false
        description: "Type the name of your build."
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  APP_NAME: ${{ github.event.inputs.app_name || github.event.repository.name }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set Version
        run: |
          VERSION="build-${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # Start Timer
      - name: Build timer Start
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV
        
      # CLI call to simulated build process
      - name: Run Build
        run: |
          bash build.sh --platform Android \
                  --project-name ${{ env.APP_NAME }} \
                  --version ${{ env.VERSION }} \
                  --profile

      # Sets the metrics of the duration and size of the build.
      - name: Build Metrics
        run: |
          BUILD_END=$(date +%s)
          DURATION=$((BUILD_END - BUILD_START))
          ARTIFACT_SIZE=$(du -sh build/Android/ | cut -f1)
          echo "BUILD_DURATION=${DURATION}s" >> $GITHUB_ENV
          echo "ARTIFACT_SIZE=$ARTIFACT_SIZE" >> $GITHUB_ENV
          echo "Build took ${DURATION} seconds"
          echo "Artifact size: $ARTIFACT_SIZE"
        
      - name: Upload Profiling to GitHub
        uses: actions/upload-artifact@v6
        with:
          name: profile-data-${{ env.APP_NAME }}-${{ env.VERSION }}
          path: cli/build/Android/*.pro
          retention-days: 30

      # CLI call to simulated upload process
      - name: Upload To CDN
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
        run: |
          bash upload.sh android build/Android/${{ env.APP_NAME }}-${{ env.VERSION }}.apk