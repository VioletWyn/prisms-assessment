name: Run Build

on:
  
  workflow_dispatch:
    inputs:
      app_name:
        type: string
        default: 'My-Prism-App'
        required: false
        description: "Type the name of your build."
  push:

env:
  APP_NAME: ${{ github.event.inputs.app_name || github.event.repository.name }}
  BUILD_VERSION: "build-${{ github.run_number }}"

jobs:
  build:
    runs-on: ${{ matrix.os }} 

    strategy:
     matrix:
      include:
      - platform: Android
        os: ubuntu-latest
        upload_platform: android
        artifact_ext: apk
      - platform: iOS
        os: macos-latest
        upload_platform: ios
        artifact_ext: ipa

    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      # CLI call to simulated build process
      - name: Run Build
        run: |
          BUILD_START=$(date +%s)
          bash build.sh --platform ${{ matrix.platform }} \
                  --project-name ${{ env.APP_NAME }} \
                  --version ${{ env.BUILD_VERSION }} \
                  --profile
          BUILD_END=$(date +%s)
          DURATION=$((BUILD_END - BUILD_START))
          echo "BUILD_DURATION=${DURATION}s" >> $GITHUB_ENV

      # Build Metric Display
      - name: Display Build Metrics
        run: |
          ARTIFACT_SIZE=$(du -sh build/${{ matrix.platform }}/ | cut -f1)
          echo "Artifact size: $ARTIFACT_SIZE"
          echo "Build took ${{ env.BUILD_DURATION }}"
          
      # Upload artifact to Github.
      - name: Upload Github Artifact Profile 
        uses: actions/upload-artifact@v6
        with:
          name: profile-data-${{ matrix.platform }}-${{ env.APP_NAME }}-${{ env.BUILD_VERSION }}
          path: cli/build/${{ matrix.platform }}/*.pro
          retention-days: 7

      # CLI call to simulated upload process
      - name: Upload To CDN
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
        run: |
          bash upload.sh ${{ matrix.upload_platform }} build/${{ matrix.platform }}/${{ env.APP_NAME }}-${{ env.BUILD_VERSION }}.${{ matrix.artifact_ext }}